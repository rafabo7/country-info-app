<!-- Error check -->

@if (countryResource.isLoading()) {
<app-loading-msg />

}

@if (countryResource.error()) {
<app-error-msg message="Error retrieving country data" />

}

<!-- No result check -->

@if (!countryResource.hasValue() && !countryResource.isLoading()) {
<app-error-msg message="Country not found" />
}

@if (countryResource.hasValue()) {
<country-info [country]="countryResource.value()" />
}
